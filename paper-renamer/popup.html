<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Renamer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e8eaf0;
    }

    .header {
      background: linear-gradient(135deg, #1a1f35 0%, #0f1117 100%);
      border-bottom: 1px solid #2a2f45;
      padding: 16px 18px 14px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .logo-icon {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #5c7cfa, #74c0fc);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: #e8eaf0;
    }

    .subtitle {
      font-size: 11px;
      color: #6b7280;
      margin-left: 32px;
    }

    .body {
      padding: 16px 18px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #1a1f2e;
      border: 1px solid #2a3050;
      border-radius: 10px;
      margin-bottom: 14px;
    }

    .toggle-label {
      font-size: 13px;
      color: #c9cfe0;
      font-weight: 500;
    }

    /* Toggle switch */
    .switch { position: relative; width: 40px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #2d3350;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.25s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; bottom: 3px;
      background: #6b7280;
      border-radius: 50%;
      transition: transform 0.25s, background 0.25s;
    }
    input:checked + .slider { background: #1e3a5f; }
    input:checked + .slider::before {
      transform: translateX(18px);
      background: #5c7cfa;
    }

    .sites-section {
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #4b5563;
      margin-bottom: 8px;
    }

    .site-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .site-badge {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 20px;
      background: #1a2540;
      border: 1px solid #2a3a5c;
      color: #7ba3d4;
      font-weight: 500;
    }

    .footer {
      padding: 10px 18px 14px;
      border-top: 1px solid #1e2235;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #4b5563;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    .dot.off { background: #4b5563; }

    #status-text { color: #6b7280; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-icon">📄</div>
      <h1>Paper Renamer</h1>
    </div>
    <div class="subtitle">Auto-rename PDFs by paper title</div>
  </div>

  <div class="body">
    <div class="toggle-row">
      <span class="toggle-label">Enable renaming</span>
      <label class="switch">
        <input type="checkbox" id="enableToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="sites-section">
      <div class="section-title">Supported Sources</div>
      <div class="site-list">
        <span class="site-badge">ACL Anthology</span>
        <span class="site-badge">arXiv</span>
        <span class="site-badge">Semantic Scholar</span>
        <span class="site-badge">OpenReview</span>
        <span class="site-badge">PMLR</span>
        <span class="site-badge">NeurIPS</span>
        <span class="site-badge">AAAI</span>
        <span class="site-badge">ACM DL</span>
        <span class="site-badge">IEEE Xplore</span>
        <span class="site-badge">Springer</span>
        <span class="site-badge">ScienceDirect</span>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="status-row">
      <div class="dot" id="statusDot"></div>
      <span id="status-text">Loading…</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
